<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageCompressor Logs</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      header { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; font-weight: 700; }
      pre { margin: 0; padding: 16px; height: calc(100vh - 52px); overflow: auto; background: #0f172a; color: #e2e8f0; }
    </style>
  </head>
  <body>
    <header>ログ</header>
    <pre id="logs">起動中...</pre>
    <script>
      const logsEl = document.getElementById('logs');
      window.logsAPI.onUpdate((text) => {
        logsEl.textContent = text || 'ログはまだありません。';
      });
    </script>
  </body>
</html>
